[build]
  publish = "."

# CRITICAL: Disable ALL post-processing to prevent Netlify/Cloudflare
# from injecting email-obfuscation scripts that break the JS
[build.processing]
  skip_processing = true

# www → root domain
[[redirects]]
  from = "https://www.macrologix.net/*"
  to   = "https://macrologix.net/:splat"
  status = 301
  force = true

# Root URL → Portal login page
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

# Short / clean URLs
[[redirects]]
  from = "/tms"
  to = "/tms.html"
  status = 200

[[redirects]]
  from = "/dispatch"
  to = "/tms.html"
  status = 200

[[redirects]]
  from = "/driver"
  to = "/driver.html"
  status = 200

[[redirects]]
  from = "/customer"
  to = "/customer-portal.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
